<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MBA Partner — AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/chatbot.css" />
  <link rel="stylesheet" href="css/fonts.css" />
</head>
<body>

<!-- ── Chat UI ─────────────────────────────────────────────── -->
<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    <div class="bot-avatar">🤖</div>
    <div class="bot-info">
      <h2>MBA Partner Assistant</h2>
      <div class="tagline">Initiative by Alumni of Old IIMs</div>
      <div class="status">
        <span class="status-dot"></span>
        Online · typically replies instantly
      </div>
    </div>
    <div class="header-right">
      <a class="back-link" href="index.html">← Back to site</a>
    </div>
  </div>

  <!-- Message area -->
  <div class="chat-body" id="chatBody"></div>

  <!-- Input -->
  <div class="chat-input-area">
    <input
      class="chat-input"
      id="chatInput"
      type="text"
      placeholder="Ask me about programs, pricing, mentors…"
      autocomplete="off"
      onkeydown="if(event.key==='Enter') sendUserMessage()"
    />
    <button class="send-btn" onclick="sendUserMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

</div>

<!-- ── Contact Modal ──────────────────────────────────────── -->
<div
  class="modal-overlay"
  id="contactModal"
  style="display:none"
  onclick="closeModalOutside(event)"
>
  <div class="modal">
    <div id="modalContent">
      <h2>✉️ Get in Touch</h2>
      <p class="modal-sub">Fill out the form and a mentor will reach out within 24 hours.</p>

      <div class="form-group">
        <label>Your Name *</label>
        <input type="text" id="nameInput" placeholder="Ananya Sharma" />
      </div>

      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" id="emailInput" placeholder="you@email.com" />
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phoneInput" placeholder="+91 98765 43210" />
      </div>

      <div class="form-group">
        <label>College / B-School</label>
        <input type="text" id="collegeInput" placeholder="IIM Lucknow" />
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea id="msgInput" placeholder="Tell us what you're looking for…"></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-submit" onclick="submitContact()">Send Message</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Scripts ────────────────────────────────────────────── -->
<script src="js/chatbot.js"></script>

</body>
</html>
